services:
  mysql:
    image: mysql:8.4
    container_name: cvgenerator-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:?Defina DATABASE_PASSWORD no .env}
      MYSQL_DATABASE: ${DATABASE_NAME:-cvgenerator}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cvgenerator-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env (mínimo 16 caracteres)}
      DATABASE_HOST: mysql
      DATABASE_PORT: "3306"
      DATABASE_USER: root
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Defina DATABASE_PASSWORD no .env}
      DATABASE_NAME: ${DATABASE_NAME:-cvgenerator}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
